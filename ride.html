<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DPTIF Ride — Trouvez un taxi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#f59e0b;--accent2:#fbbf24;--green:#10b981;--red:#ef4444;
  --blue:#3b82f6;--purple:#8b5cf6;
  --bg:#0b0f1a;--surface:#111827;--surface2:#1a2234;
  --border:rgba(245,158,11,.15);--text:#f0f6ff;--text2:#94a3b8;--text3:#475569;
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}

/* ── Layout ── */
.app{display:flex;flex-direction:column;height:100vh}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:1000;
}
.logo{font-size:18px;font-weight:900;color:var(--accent)}
.logo span{color:var(--text2);font-weight:400;font-size:14px}
.mode-tabs{display:flex;gap:4px;margin-left:auto}
.mode-tab{
  padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;
  transition:all .2s;
}
.mode-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* ── Carte ── */
#map{flex:1;z-index:1;position:relative}
#map .leaflet-container{background:#1a2234}

/* ── Panel flottant ── */
.float-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:500;
  background:var(--surface);border-radius:20px 20px 0 0;
  border-top:1px solid var(--border);
  max-height:55vh;display:flex;flex-direction:column;
  transition:max-height .3s;
}
.float-panel.expanded{max-height:80vh}
.panel-handle{
  width:40px;height:4px;background:var(--border);
  border-radius:2px;margin:10px auto 0;cursor:pointer;
  transition:background .2s;
}
.panel-handle:hover{background:var(--accent)}
.panel-content{flex:1;overflow-y:auto;padding:12px 16px 20px}

/* ── Lever la main (client) ── */
.hand-section{text-align:center;padding:16px 0 8px}
.btn-raise{
  width:140px;height:140px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--accent),#f97316);
  color:#000;font-size:42px;font-weight:900;
  box-shadow:0 0 0 0 rgba(245,158,11,.4);
  transition:transform .2s,box-shadow .2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
}
.btn-raise.active{
  background:linear-gradient(135deg,var(--red),#dc2626);
  animation:pulse-ring 1.5s ease-out infinite;
  color:#fff;
}
@keyframes pulse-ring{
  0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}
  70%{box-shadow:0 0 0 24px rgba(239,68,68,0)}
  100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}
}
.btn-raise span{font-size:11px;font-weight:700;letter-spacing:.5px}

/* ── Infos position ── */
.position-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;margin:10px 0;
  display:flex;align-items:center;gap:12px;
}
.pos-icon{font-size:22px;flex-shrink:0}
.pos-info{flex:1;min-width:0}
.pos-addr{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos-coord{font-size:11px;color:var(--text3)}

/* ── Recherche itinéraire ── */
.route-section{margin:8px 0}
.route-input-wrap{position:relative;margin-bottom:8px}
.route-input{
  width:100%;padding:10px 14px 10px 36px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:13px;
  transition:border-color .2s;
}
.route-input:focus{border-color:var(--accent);outline:none}
.route-input-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:16px;pointer-events:none;
}
.route-suggestions{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:600;
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;max-height:180px;overflow-y:auto;display:none;
}
.route-suggestions.open{display:block}
.suggestion-item{
  padding:10px 14px;font-size:13px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;
}
.suggestion-item:hover{background:var(--surface2)}
.suggestion-item:last-child{border-bottom:none}

.btn-route{
  width:100%;padding:11px;background:var(--accent);color:#000;
  border:none;border-radius:10px;font-size:13px;font-weight:700;
  cursor:pointer;transition:opacity .2s;display:flex;align-items:center;
  justify-content:center;gap:8px;
}
.btn-route:hover{opacity:.85}
.btn-route:disabled{opacity:.4;cursor:not-allowed}

/* ── Infos itinéraire ── */
.route-info{
  display:none;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;margin-top:8px;
}
.route-info.visible{display:block}
.route-stats{display:flex;gap:16px;margin-bottom:8px}
.route-stat{flex:1;text-align:center}
.route-stat-val{font-size:18px;font-weight:800;color:var(--accent)}
.route-stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.route-steps{max-height:120px;overflow-y:auto}
.route-step{font-size:12px;color:var(--text2);padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:8px}
.route-step:last-child{border-bottom:none}
.step-icon{flex-shrink:0}

/* ── Chat ── */
.chat-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.chat-avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;flex-shrink:0;
}
.chat-name{font-size:13px;font-weight:700}
.chat-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px}
.chat-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.chat-messages{
  flex:1;overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.msg{max-width:75%;padding:9px 12px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word}
.msg.me{
  align-self:flex-end;background:var(--accent);color:#000;
  border-radius:14px 14px 4px 14px;
}
.msg.other{
  align-self:flex-start;background:var(--surface2);color:var(--text);
  border-radius:14px 14px 14px 4px;
}
.msg-time{font-size:10px;opacity:.6;margin-top:3px}
.msg-system{
  align-self:center;font-size:11px;color:var(--text3);
  background:rgba(255,255,255,.05);padding:4px 12px;border-radius:10px;text-align:center;
}

.chat-input-wrap{
  padding:10px 16px;border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;flex-shrink:0;
}
.chat-input{
  flex:1;padding:10px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:24px;
  color:var(--text);font-size:13px;resize:none;
  max-height:80px;transition:border-color .2s;
}
.chat-input:focus{border-color:var(--accent);outline:none}
.btn-send{
  width:38px;height:38px;border-radius:50%;background:var(--accent);
  border:none;color:#000;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;flex-shrink:0;
}
.btn-send:hover{opacity:.85}

/* ── Panneau chauffeur ── */
.driver-panel{padding:8px 0}
.driver-title{font-size:16px;font-weight:800;margin-bottom:12px}
.demand-list{display:flex;flex-direction:column;gap:10px}
.demand-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  animation:slide-in .3s ease-out;
}
@keyframes slide-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.demand-pulse{
  width:44px;height:44px;border-radius:50%;background:var(--red);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  animation:pulse-sm 1s ease-in-out infinite;
}
@keyframes pulse-sm{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.demand-info{flex:1;min-width:0}
.demand-name{font-size:13px;font-weight:700}
.demand-addr{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.demand-dist{font-size:11px;color:var(--accent);font-weight:600}
.btn-accept{
  padding:7px 14px;background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
  transition:opacity .2s;flex-shrink:0;
}
.btn-accept:hover{opacity:.85}
.no-demand{text-align:center;padding:30px 0;color:var(--text3);font-size:13px}

/* ── Trafic ── */
.trafic-bar{
  position:absolute;top:60px;right:12px;z-index:400;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px 12px;font-size:11px;
  display:flex;flex-direction:column;gap:4px;min-width:120px;
}
.trafic-title{font-weight:700;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.trafic-item{display:flex;align-items:center;gap:6px}
.trafic-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Notification ── */
.notif{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--surface);border:1px solid var(--border);
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;
  z-index:9999;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.4);
  white-space:nowrap;
}
.notif.show{transform:translateX(-50%) translateY(0)}

/* ── Marker styles ── */
.marker-client{
  width:36px;height:36px;border-radius:50%;background:var(--red);
  border:3px solid #fff;display:flex;align-items:center;justify-content:center;
  font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.4);animation:pulse-sm 1s infinite;
}
.marker-driver{
  width:36px;height:36px;border-radius:50%;background:var(--accent);
  border:3px solid #fff;display:flex;align-items:center;justify-content:center;
  font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.4);
}
.marker-dest{
  width:32px;height:32px;border-radius:50%;background:var(--green);
  border:3px solid #fff;display:flex;align-items:center;justify-content:center;
  font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.4);
}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="logo">DPTIF<span> Ride</span></div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('client')" id="tab-client">🙋 Client</button>
      <button class="mode-tab" onclick="setMode('chauffeur')" id="tab-chauffeur">🚕 Chauffeur</button>
    </div>
  </div>

  <!-- Carte -->
  <div style="position:relative;flex:1;display:flex;flex-direction:column">
    <div id="map"></div>

    <!-- Badge trafic -->
    <div class="trafic-bar" id="trafic-bar">
      <div class="trafic-title">Trafic</div>
      <div class="trafic-item"><div class="trafic-dot" style="background:#10b981"></div><span id="trafic-status">Chargement...</span></div>
    </div>

    <!-- Panel flottant -->
    <div class="float-panel" id="float-panel">
      <div class="panel-handle" onclick="togglePanel()"></div>

      <!-- MODE CLIENT -->
      <div id="panel-client" class="panel-content">

        <!-- Lever la main -->
        <div class="hand-section">
          <button class="btn-raise" id="btn-raise" onclick="toggleRaise()">
            <span id="raise-icon">✋</span>
            <span id="raise-label">LEVER LA MAIN</span>
          </button>
          <div style="font-size:11px;color:var(--text3);margin-top:10px" id="raise-status">
            Appuyez pour signaler votre position aux chauffeurs
          </div>
        </div>

        <!-- Position actuelle -->
        <div class="position-card" id="pos-card">
          <div class="pos-icon">📍</div>
          <div class="pos-info">
            <div class="pos-addr" id="pos-addr">Localisation en cours...</div>
            <div class="pos-coord" id="pos-coord">---</div>
          </div>
          <button onclick="centerMap()" style="background:rgba(245,158,11,.15);border:none;border-radius:8px;padding:6px 10px;color:var(--accent);cursor:pointer;font-size:18px">⊕</button>
        </div>

        <!-- Itinéraire -->
        <div class="route-section">
          <div style="font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Calculer un itinéraire</div>

          <div class="route-input-wrap" style="position:relative">
            <span class="route-input-icon">🟢</span>
            <input class="route-input" id="input-depart" placeholder="Point de départ (ma position)" readonly style="cursor:pointer" onclick="useMyPosition()">
          </div>

          <div class="route-input-wrap" style="position:relative">
            <span class="route-input-icon">🔴</span>
            <input class="route-input" id="input-arrivee" placeholder="Destination..." oninput="searchPlace(this.value,'arrivee')" autocomplete="off">
            <div class="route-suggestions" id="sugg-arrivee"></div>
          </div>

          <button class="btn-route" id="btn-route" onclick="calcRoute()" disabled>
            <span>🗺</span> Calculer l'itinéraire
          </button>

          <div class="route-info" id="route-info">
            <div class="route-stats">
              <div class="route-stat">
                <div class="route-stat-val" id="route-dist">--</div>
                <div class="route-stat-lbl">Distance</div>
              </div>
              <div class="route-stat">
                <div class="route-stat-val" id="route-time">--</div>
                <div class="route-stat-lbl">Durée</div>
              </div>
              <div class="route-stat">
                <div class="route-stat-val" id="route-cost">--</div>
                <div class="route-stat-lbl">Tarif estimé</div>
              </div>
            </div>
            <div class="route-steps" id="route-steps"></div>
          </div>
        </div>

      </div>

      <!-- MODE CHAUFFEUR -->
      <div id="panel-chauffeur" class="panel-content" style="display:none">
        <div class="driver-panel">
          <div class="driver-title">🚕 Demandes en cours <span id="demand-count" style="font-size:13px;color:var(--accent)">0</span></div>
          <div class="demand-list" id="demand-list">
            <div class="no-demand" id="no-demand">Aucune demande pour le moment.<br>Les clients qui lèvent la main apparaîtront ici.</div>
          </div>
        </div>
      </div>

    </div><!-- /float-panel -->

    <!-- Panel Chat (slide depuis le bas) -->
    <div id="chat-panel" style="position:absolute;inset:0;z-index:600;background:var(--surface);display:none;flex-direction:column">
      <div class="chat-header">
        <button onclick="closeChat()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 8px 0 0">←</button>
        <div class="chat-avatar" id="chat-avatar" style="background:var(--accent);color:#000">?</div>
        <div>
          <div class="chat-name" id="chat-name">---</div>
          <div class="chat-status" id="chat-online">En ligne</div>
        </div>
        <button onclick="shareRoute()" style="margin-left:auto;background:rgba(245,158,11,.15);border:1px solid var(--border);border-radius:8px;padding:6px 12px;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700">📍 Partager ma position</button>
      </div>
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chat-input" placeholder="Message..." rows="1" onkeydown="chatKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-send" onclick="sendMsg()">➤</button>
      </div>
    </div>

  </div><!-- /map container -->
</div>

<!-- Notification -->
<div class="notif" id="notif"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ════════════════════════════════════════════════
// DPTIF Ride — Client + Chauffeur
// OpenStreetMap + OSRM + Firebase Chat
// ════════════════════════════════════════════════

var _mode     = 'client';
var _myPos    = null;      // {lat, lng}
var _destPos  = null;
var _raised   = false;
var _routeLayer = null;
var _myMarker   = null;
var _destMarker = null;
var _driverMarkers = {};
var _panelOpen  = true;
var _chatOpen   = false;
var _chatPartner = null;
var _sessionId  = 'user_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
var _demands    = {};   // id -> {lat, lng, addr, name}
var _msgListeners = {};

// Tarif estimé (F CFA / km) — configurable
var TARIF_KM = { 'Taxi':400, 'Moto-taxi':200, 'VTC':600, 'default':350 };

// ── Carte ───────────────────────────────────────
var map = L.map('map', {
  zoomControl: false,
  attributionControl: false,
}).setView([6.3676, 2.4252], 13);  // Cotonou par défaut

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);

// Trafic simulé (OSRM ne fournit pas le trafic, on simule visuellement)
// Couche trafic colorée via OpenStreetMap routing
function updateTraficBadge() {
  var hour = new Date().getHours();
  var heures_pointe = (hour >= 7 && hour <= 9) || (hour >= 17 && hour <= 20);
  var el = document.getElementById('trafic-status');
  if(heures_pointe) {
    el.textContent = 'Dense — Heure de pointe';
    el.style.color = '#ef4444';
  } else if(hour >= 22 || hour <= 5) {
    el.textContent = 'Fluide — Nuit calme';
    el.style.color = '#10b981';
  } else {
    el.textContent = 'Modéré';
    el.style.color = '#f59e0b';
  }
}
updateTraficBadge();
setInterval(updateTraficBadge, 60000);

// ── Géolocalisation ──────────────────────────────
function startGeo() {
  if(!navigator.geolocation) {
    showNotif('GPS non disponible sur ce navigateur');
    setFallbackPos();
    return;
  }
  navigator.geolocation.watchPosition(
    function(pos) {
      _myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      updateMyMarker();
      updatePosCard();
    },
    function(err) {
      showNotif('GPS: ' + err.message + ' — Position par défaut (Cotonou)');
      setFallbackPos();
    },
    { enableHighAccuracy: true, maximumAge: 10000, timeout: 15000 }
  );
}

function setFallbackPos() {
  // Cotonou centre
  _myPos = { lat: 6.3676, lng: 2.4252 };
  updateMyMarker();
  updatePosCard();
}

function updateMyMarker() {
  if(!_myPos) return;
  if(_myMarker) { _myMarker.setLatLng([_myPos.lat, _myPos.lng]); return; }
  var icon = L.divIcon({
    html: '<div class="marker-' + _mode + '">'+(_mode==='client'?'🙋':'🚕')+'</div>',
    iconSize: [36, 36], iconAnchor: [18, 18], className: ''
  });
  _myMarker = L.marker([_myPos.lat, _myPos.lng], {icon: icon}).addTo(map);
  map.setView([_myPos.lat, _myPos.lng], 15);
}

function updateMyMarkerIcon() {
  if(!_myMarker || !_myPos) return;
  map.removeLayer(_myMarker); _myMarker = null;
  updateMyMarker();
}

function centerMap() {
  if(_myPos) map.setView([_myPos.lat, _myPos.lng], 15);
}

// ── Position card ────────────────────────────────
function updatePosCard() {
  if(!_myPos) return;
  document.getElementById('pos-coord').textContent =
    _myPos.lat.toFixed(5) + ', ' + _myPos.lng.toFixed(5);
  // Reverse geocoding avec Nominatim
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+_myPos.lat+'&lon='+_myPos.lng+'&format=json&accept-language=fr')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var addr = d.address;
      var parts = [addr.road, addr.suburb, addr.city || addr.town || addr.village].filter(Boolean);
      document.getElementById('pos-addr').textContent = parts.join(', ') || d.display_name.split(',').slice(0,2).join(',');
      document.getElementById('input-depart').value = parts.join(', ') || 'Ma position';
    })
    .catch(function(){
      document.getElementById('pos-addr').textContent = 'Position actuelle';
      document.getElementById('input-depart').value = 'Ma position';
    });
}

function useMyPosition() {
  if(!_myPos) return;
  document.getElementById('input-depart').value = document.getElementById('pos-addr').textContent || 'Ma position';
}

// ── Recherche de lieu (Nominatim) ──────────────────
var _searchTimeout = null;
function searchPlace(q, type) {
  clearTimeout(_searchTimeout);
  var suggEl = document.getElementById('sugg-' + type);
  if(!q || q.length < 3) { suggEl.classList.remove('open'); return; }
  _searchTimeout = setTimeout(function() {
    var bbox = '1.5,5.5,3.5,7.5'; // Bénin
    fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q)
      + '&format=json&limit=5&countrycodes=bj&accept-language=fr&viewbox='+bbox+'&bounded=0')
      .then(function(r){ return r.json(); })
      .then(function(results) {
        if(!results.length) { suggEl.classList.remove('open'); return; }
        suggEl.innerHTML = results.map(function(r) {
          return '<div class="suggestion-item" onclick="selectPlace(\''+r.lat+'\',\''+r.lon+'\',\''+escape(r.display_name)+'\',\''+type+'\')">'
            + r.display_name.split(',').slice(0,3).join(', ') + '</div>';
        }).join('');
        suggEl.classList.add('open');
      }).catch(function(){});
  }, 500);
}

function selectPlace(lat, lon, name, type) {
  var decodedName = unescape(name).split(',').slice(0,2).join(', ');
  document.getElementById('input-' + type).value = decodedName;
  document.getElementById('sugg-' + type).classList.remove('open');
  if(type === 'arrivee') {
    _destPos = { lat: parseFloat(lat), lng: parseFloat(lon) };
    // Marqueur destination
    if(_destMarker) map.removeLayer(_destMarker);
    var icon2 = L.divIcon({
      html: '<div class="marker-dest">📍</div>',
      iconSize: [32, 32], iconAnchor: [16, 16], className: ''
    });
    _destMarker = L.marker([_destPos.lat, _destPos.lng], {icon: icon2})
      .addTo(map)
      .bindPopup('<b>Destination</b><br>' + decodedName);
    document.getElementById('btn-route').disabled = false;
  }
}

// ── Calcul itinéraire (OSRM gratuit) ─────────────
function calcRoute() {
  if(!_myPos || !_destPos) { showNotif('Position ou destination manquante'); return; }
  var url = 'https://router.project-osrm.org/route/v1/driving/'
    + _myPos.lng + ',' + _myPos.lat + ';'
    + _destPos.lng + ',' + _destPos.lat
    + '?overview=full&geometries=geojson&steps=true';

  document.getElementById('btn-route').textContent = '⏳ Calcul...';
  document.getElementById('btn-route').disabled = true;

  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if(!data.routes || !data.routes.length) {
        showNotif('Itinéraire introuvable');
        document.getElementById('btn-route').innerHTML = '<span>🗺</span> Calculer l\'itinéraire';
        document.getElementById('btn-route').disabled = false;
        return;
      }
      var route  = data.routes[0];
      var distKm = (route.distance / 1000).toFixed(1);
      var durMin = Math.round(route.duration / 60);
      var tarif  = Math.round(parseFloat(distKm) * TARIF_KM['default'] / 100) * 100;

      // Afficher les stats
      document.getElementById('route-dist').textContent = distKm + ' km';
      document.getElementById('route-time').textContent = durMin < 60 ? durMin + ' min' : Math.floor(durMin/60) + 'h' + (durMin%60) + 'm';
      document.getElementById('route-cost').textContent = tarif.toLocaleString('fr-FR') + ' F';
      document.getElementById('route-info').classList.add('visible');

      // Étapes
      var steps = route.legs[0].steps.slice(0,8);
      document.getElementById('route-steps').innerHTML = steps.map(function(s) {
        var maneuver = s.maneuver.type;
        var icon = maneuver === 'turn' ? (s.maneuver.modifier === 'left' ? '↰' : '↱')
                 : maneuver === 'arrive' ? '✅'
                 : '→';
        var dist = s.distance > 1000 ? (s.distance/1000).toFixed(1)+' km' : Math.round(s.distance)+' m';
        return '<div class="route-step"><span class="step-icon">'+icon+'</span><span>'+s.name+'</span><span style="margin-left:auto;color:var(--text3)">'+dist+'</span></div>';
      }).join('');

      // Tracer la route sur la carte
      if(_routeLayer) map.removeLayer(_routeLayer);
      _routeLayer = L.geoJSON(route.geometry, {
        style: { color: '#f59e0b', weight: 5, opacity: 0.85, dashArray: '0' }
      }).addTo(map);

      // Zoom sur le trajet
      var bounds = _routeLayer.getBounds();
      map.fitBounds(bounds, { padding: [60, 60] });

      document.getElementById('btn-route').innerHTML = '<span>🗺</span> Recalculer';
      document.getElementById('btn-route').disabled = false;
      showNotif('Itinéraire : ' + distKm + ' km — ' + durMin + ' min — ≈' + tarif.toLocaleString('fr-FR') + ' F');
    })
    .catch(function(e) {
      showNotif('Erreur calcul itinéraire');
      document.getElementById('btn-route').innerHTML = '<span>🗺</span> Calculer l\'itinéraire';
      document.getElementById('btn-route').disabled = false;
    });
}

// ── Lever la main ─────────────────────────────────
function toggleRaise() {
  _raised = !_raised;
  var btn   = document.getElementById('btn-raise');
  var icon  = document.getElementById('raise-icon');
  var label = document.getElementById('raise-label');
  var status= document.getElementById('raise-status');

  if(_raised) {
    btn.classList.add('active');
    icon.textContent  = '✋';
    label.textContent = 'MAIN LEVÉE';
    status.textContent = 'Les chauffeurs voient votre position — restez visible !';
    status.style.color = '#ef4444';
    publishDemand();
    showNotif('✋ Demande envoyée ! Les chauffeurs vous voient.');
  } else {
    btn.classList.remove('active');
    icon.textContent  = '✋';
    label.textContent = 'LEVER LA MAIN';
    status.textContent = 'Appuyez pour signaler votre position aux chauffeurs';
    status.style.color = '';
    cancelDemand();
    showNotif('Demande annulée');
  }
}

// ── Firebase Chat & Demandes ─────────────────────
var _FB = null;
var _db = null;

window.addEventListener('DOMContentLoaded', function(){
  // Attendre que Firebase soit initialisé
  setTimeout(function(){
    _FB = window.DPTIF_FB;
    if(_FB) {
      _db = _FB.db;
      listenDemands();
    }
  }, 800);
  startGeo();
  expandPanel();
});

function publishDemand() {
  if(!_FB || !_myPos) return;
  var addr = document.getElementById('pos-addr').textContent || 'Position inconnue';
  var demand = {
    id      : _sessionId,
    lat     : _myPos.lat,
    lng     : _myPos.lng,
    addr    : addr,
    name    : 'Client ' + _sessionId.slice(-4).toUpperCase(),
    ts      : new Date().toISOString(),
    active  : true,
  };
  _FB.setDoc(_FB.doc(_db, 'dptif_ride/demands/' + _sessionId), demand, {merge:true})
    .catch(function(e){ console.warn('publishDemand:', e); });
  // Ajouter un marqueur visible sur la carte
  var icon = L.divIcon({
    html: '<div class="marker-client">✋</div>',
    iconSize: [36, 36], iconAnchor: [18, 18], className: ''
  });
  if(_myMarker) map.removeLayer(_myMarker);
  _myMarker = L.marker([_myPos.lat, _myPos.lng], {icon: icon}).addTo(map);
}

function cancelDemand() {
  if(!_FB) return;
  _FB.setDoc(_FB.doc(_db, 'dptif_ride/demands/' + _sessionId), {active: false}, {merge:true})
    .catch(function(){});
  updateMyMarkerIcon();
}

function listenDemands() {
  if(!_FB) return;
  var ref = _FB.collection(_db, 'dptif_ride/demands');
  _FB.onSnapshot(ref, function(snap) {
    snap.docChanges().forEach(function(change) {
      var d = Object.assign({id: change.doc.id}, change.doc.data());
      if(change.type === 'removed' || !d.active) {
        // Supprimer le marqueur
        if(_driverMarkers[d.id]) {
          map.removeLayer(_driverMarkers[d.id]);
          delete _driverMarkers[d.id];
        }
        delete _demands[d.id];
      } else if(d.id !== _sessionId && d.active) {
        _demands[d.id] = d;
        // Ajouter marqueur sur la carte
        if(_driverMarkers[d.id]) map.removeLayer(_driverMarkers[d.id]);
        var icon = L.divIcon({
          html: '<div class="marker-client">✋</div>',
          iconSize: [36, 36], iconAnchor: [18, 18], className: ''
        });
        _driverMarkers[d.id] = L.marker([d.lat, d.lng], {icon: icon})
          .addTo(map)
          .bindPopup('<b>'+d.name+'</b><br>'+d.addr+'<br><button onclick="openChat(\''+d.id+'\',\''+d.name+'\')" style="margin-top:6px;padding:4px 12px;background:#f59e0b;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700">💬 Contacter</button>');
      }
    });
    renderDemandList();
  }, function(){ });
}

function renderDemandList() {
  var list = document.getElementById('demand-list');
  var noEl = document.getElementById('no-demand');
  var countEl = document.getElementById('demand-count');
  var keys = Object.keys(_demands);
  countEl.textContent = keys.length;

  if(!keys.length) {
    list.innerHTML = '';
    noEl.style.display = 'block';
    return;
  }
  noEl.style.display = 'none';
  list.innerHTML = keys.map(function(k) {
    var d = _demands[k];
    var dist = _myPos ? calcDist(_myPos, {lat:d.lat, lng:d.lng}) : '?';
    return '<div class="demand-card">'
      + '<div class="demand-pulse">✋</div>'
      + '<div class="demand-info">'
        + '<div class="demand-name">' + d.name + '</div>'
        + '<div class="demand-addr">' + (d.addr || '---') + '</div>'
        + '<div class="demand-dist">' + (typeof dist === 'number' ? dist.toFixed(1)+' km' : dist) + ' · Cherche taxi</div>'
      + '</div>'
      + '<button class="btn-accept" onclick="acceptDemand(\''+d.id+'\',\''+d.name+'\')">Accepter</button>'
    + '</div>';
  }).join('');
}

function calcDist(a, b) {
  var R = 6371;
  var dLat = (b.lat-a.lat)*Math.PI/180;
  var dLon = (b.lng-a.lng)*Math.PI/180;
  var x = Math.sin(dLat/2)*Math.sin(dLat/2)
    + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function acceptDemand(id, name) {
  showNotif('✅ Demande de ' + name + ' acceptée !');
  openChat(id, name);
  // Zoom vers le client
  if(_demands[id]) {
    var d = _demands[id];
    map.setView([d.lat, d.lng], 16);
    if(_driverMarkers[id]) _driverMarkers[id].openPopup();
  }
}

// ── Chat ─────────────────────────────────────────
function openChat(partnerId, partnerName) {
  _chatPartner = {id: partnerId, name: partnerName};
  document.getElementById('chat-name').textContent = partnerName;
  document.getElementById('chat-avatar').textContent = partnerName.charAt(0).toUpperCase();
  document.getElementById('chat-panel').style.display = 'flex';
  _chatOpen = true;
  // Charger les messages
  loadMessages(partnerId);
  showNotif('💬 Chat ouvert avec ' + partnerName);
}

function closeChat() {
  document.getElementById('chat-panel').style.display = 'none';
  _chatOpen = false;
  _chatPartner = null;
}

function loadMessages(partnerId) {
  if(!_FB) {
    // Mode démo sans Firebase
    var messagesEl = document.getElementById('chat-messages');
    messagesEl.innerHTML =
      '<div class="msg-system">Conversation avec ' + partnerId + '</div>'
      + '<div class="msg other">Bonjour ! Je suis disponible pour vous prendre en charge.<div class="msg-time">Il y a 2 min</div></div>'
      + '<div class="msg me">Je suis devant le marché Dantokpa.<div class="msg-time">Il y a 1 min</div></div>';
    return;
  }
  var chatId = [_sessionId, partnerId].sort().join('_');
  var ref = _FB.collection(_db, 'dptif_ride/chats/' + chatId + '/messages');
  var q   = _FB.query(ref, _FB.orderBy('ts', 'asc'), _FB.limitToLast(50));
  if(_msgListeners[chatId]) _msgListeners[chatId]();
  _msgListeners[chatId] = _FB.onSnapshot(q, function(snap) {
    var messagesEl = document.getElementById('chat-messages');
    messagesEl.innerHTML = '';
    snap.forEach(function(doc) {
      var m = doc.data();
      var isMe = m.from === _sessionId;
      var div  = document.createElement('div');
      div.className = 'msg ' + (isMe ? 'me' : 'other');
      var time = m.ts ? new Date(m.ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
      div.innerHTML = m.text + '<div class="msg-time">' + time + '</div>';
      messagesEl.appendChild(div);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }, function(){});
}

function sendMsg() {
  var input = document.getElementById('chat-input');
  var text  = input.value.trim();
  if(!text) return;
  input.value = '';
  autoResize(input);

  if(!_FB || !_chatPartner) {
    // Mode démo
    var messagesEl = document.getElementById('chat-messages');
    var div = document.createElement('div');
    div.className = 'msg me';
    div.innerHTML = text + '<div class="msg-time">' + new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) + '</div>';
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    // Réponse simulée
    setTimeout(function(){
      var auto = document.createElement('div');
      auto.className = 'msg other';
      var autoTexts = ['Je vous localise sur la carte !', 'J\'arrive dans 5 minutes.', 'Envoyez votre position exacte.','D\'accord, je viens.'];
      auto.innerHTML = autoTexts[Math.floor(Math.random()*autoTexts.length)] + '<div class="msg-time">maintenant</div>';
      messagesEl.appendChild(auto);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 1500);
    return;
  }

  var chatId = [_sessionId, _chatPartner.id].sort().join('_');
  var ref = _FB.collection(_db, 'dptif_ride/chats/' + chatId + '/messages');
  _FB.addDoc(ref, {
    text: text,
    from: _sessionId,
    to  : _chatPartner.id,
    ts  : new Date().toISOString(),
  }).catch(function(){});
}

function shareRoute() {
  if(!_myPos) { showNotif('Position non disponible'); return; }
  var url = 'https://www.openstreetmap.org/?mlat='+_myPos.lat+'&mlon='+_myPos.lng+'#map=16/'+_myPos.lat+'/'+_myPos.lng;
  var text = '📍 Ma position : ' + url;
  var input = document.getElementById('chat-input');
  input.value = text;
  sendMsg();
  showNotif('📍 Position partagée dans le chat');
}

function chatKeyDown(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 80) + 'px';
}

// ── Navigation modes ──────────────────────────────
function setMode(mode) {
  _mode = mode;
  document.getElementById('tab-client').classList.toggle('active', mode === 'client');
  document.getElementById('tab-chauffeur').classList.toggle('active', mode === 'chauffeur');
  document.getElementById('panel-client').style.display     = mode === 'client' ? 'block' : 'none';
  document.getElementById('panel-chauffeur').style.display  = mode === 'chauffeur' ? 'block' : 'none';
  updateMyMarkerIcon();
  if(mode === 'chauffeur') {
    listenDemands();
    showNotif('Mode chauffeur activé — Les demandes apparaîtront ici');
  }
}

// ── Panel toggle ──────────────────────────────────
function togglePanel() {
  var panel = document.getElementById('float-panel');
  panel.classList.toggle('expanded');
}
function expandPanel() {
  document.getElementById('float-panel').classList.add('expanded');
}

// ── Notification ──────────────────────────────────
var _notifTimer = null;
function showNotif(msg) {
  var el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_notifTimer);
  _notifTimer = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}

// ── Fermer suggestions au clic extérieur ──────────
document.addEventListener('click', function(e) {
  if(!e.target.closest('.route-input-wrap'))
    document.querySelectorAll('.route-suggestions').forEach(function(el){ el.classList.remove('open'); });
});
</script>
